<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPayroll - Treasurer Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Include canvas-confetti for a wow! approval effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <nav>
        <div class="logo">XRPayroll</div>
        <div class="links">
            <a href="/static/index.html">Submit</a>
            <a href="/static/treasurer.html" class="active">Treasurer</a>
        </div>
    </nav>

    <div class="container" style="max-width: 1200px;">
        <div class="header-text" style="margin-bottom: 50px;">
            <h1>Pending Approvals</h1>
            <p>Review AI-extracted receipts and broadcast XRP payments.</p>
        </div>

        <div class="dashboard-grid" id="grid">
            <!-- Cards injected here via JS -->
            <div class="empty-state">Loading receipts...</div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');

        async function fetchPending() {
            try {
                const res = await fetch('/pending-receipts');
                const data = await res.json();

                grid.innerHTML = '';

                if (data.length === 0) {
                    grid.innerHTML = `<div class="empty-state">No pending receipts found. You're all caught up!</div>`;
                    return;
                }

                data.forEach((r, idx) => {
                    const delay = idx * 0.1;
                    const card = document.createElement('div');
                    card.className = 'glass-panel receipt-card';
                    card.style.animationDelay = `${delay}s`;

                    card.innerHTML = `
                        <div class="amount">$${Number(r.amount).toFixed(2)}</div>
                        <div class="merchant">${r.merchant || 'Unknown Merchant'}</div>
                        <div class="date">${r.date || 'Unknown Date'}</div>
                        
                        <div class="details-row">
                            <strong>Submitter:</strong>
                            <span>${r.submitter}</span>
                        </div>
                        
                        <img src="/${r.image_path}" class="image-preview" alt="Receipt Image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0NCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmaWxsPSIjYWFhIiBkeT0iLjNlbSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTWlzc2luZzwvdGV4dD48L3N2Zz4='">
                        
                        <div id="result-${r.id}" class="result-box" style="display:none; margin-top:0; margin-bottom: 15px;"></div>

                        <button class="btn-primary" id="btn-${r.id}" onclick="approve(${r.id})">
                            <span class="btn-text">Approve & Pay (XRPL)</span>
                            <span class="spinner"></span>
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = `<div class="empty-state">Failed to load receipts: ${error.message}</div>`;
            }
        }

        async function approve(id) {
            const btn = document.getElementById(`btn-${id}`);
            const resultBox = document.getElementById(`result-${id}`);

            btn.classList.add('loading');
            resultBox.style.display = 'none';

            try {
                const res = await fetch(`/approve-receipt/${id}`, { method: 'POST' });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Approval failed');

                // Confetti Animation for wow factor
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#00f2fe', '#4facfe', '#00e676']
                });

                btn.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = `
                    <strong>Payment Sent!</strong><br>
                    <a href="https://testnet.xrpl.org/transactions/${data.tx_hash}" target="_blank" class="tx-link">
                        View Tx: ${data.tx_hash.substring(0, 20)}...
                    </a>
                `;
            } catch (error) {
                btn.classList.remove('loading');
                resultBox.style.display = 'block';
                resultBox.classList.add('error-box');
                resultBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
        }

        // Init
        fetchPending();
    </script>
</body>

</html>
