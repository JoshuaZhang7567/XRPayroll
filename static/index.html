<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPayroll - Submit Receipt</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav>
        <div class="logo">XRPayroll</div>
        <div class="links">
            <a href="/static/index.html" class="active">Submit</a>
            <a href="/static/treasurer.html">Treasurer</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <div class="header-text">
                <h1>Submit Receipt</h1>
                <p>Upload your receipt for instant XRPL reimbursement.</p>
            </div>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="submitterId">Your Submitter ID</label>
                    <input type="number" id="submitterId" class="glass-input" required placeholder="e.g. 1">
                    <small style="color: var(--text-secondary); margin-top:5px; display:block; font-size: 0.8rem;">
                        (Create a user via API to get an ID first if needed)
                    </small>
                </div>

                <div class="form-group">
                    <label>Receipt Image</label>
                    <label class="file-drop-area" id="dropArea">
                        <div class="icon">📸</div>
                        <div class="msg" id="fileMsg">Drag & drop image here or click to browse</div>
                        <input type="file" id="receiptFile" accept="image/*" required>
                    </label>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Extract & Submit</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div id="resultBox" class="result-box"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('receiptFile');
        const fileMsg = document.getElementById('fileMsg');
        const form = document.getElementById('uploadForm');
        const btn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileMsg.textContent = "Selected: " + e.target.files[0].name;
                document.getElementById('dropArea').style.borderColor = "var(--primary)";
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            const submitterId = document.getElementById('submitterId').value;
            
            if(!file || !submitterId) return;

            btn.classList.add('loading');
            resultBox.style.display = 'none';
            resultBox.className = 'result-box';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('submitter_id', submitterId);

            try {
                const res = await fetch('/submit-receipt', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                
                if(!res.ok) throw new Error(data.detail || 'Submission failed');

                resultBox.style.display = 'block';
                resultBox.innerHTML = `
                    <strong>Submission Success!</strong><br><br>
                    Merchant: ${data.receipt.merchant}<br>
                    Amount: $${data.receipt.amount}<br>
                    Date: ${data.receipt.date}<br><br>
                    <small>Awaiting treasurer approval.</small>
                `;
                form.reset();
                fileMsg.textContent = "Drag & drop image here or click to browse";
                document.getElementById('dropArea').style.borderColor = "rgba(255,255,255,0.2)";

            } catch (error) {
                resultBox.style.display = 'block';
                resultBox.classList.add('error-box');
                resultBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
